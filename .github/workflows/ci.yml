name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t flask-hello .

      - name: Run the container
        run: docker run -d -p 8080:5000 --name test-app flask-hello

      - name: Test the app responds
        run: |
          sleep 3
          curl --fail http://localhost:8080

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t flask-hello .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-hello
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

